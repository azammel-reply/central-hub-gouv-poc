name: Spectral lint + score

on:
  push:
    paths:
      - 'specs/**.yaml'
      - 'owasp23-ruleset.spectral.yml'
  pull_request:
    paths:
      - 'specs/**.yaml'

jobs:
  lint-and-score:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Spectral
        run: npm install

      - name: Inspect Specs (Console Output)
        run: npm run lint || true

      - name: Lint all specs — JSON output
        run: |
          mkdir -p results
          for spec in specs/*.yaml; do
            name=$(basename "$spec" .yaml)
            ./node_modules/.bin/spectral lint "$spec" \
              --ruleset owasp23-ruleset.spectral.yml \
              --format json \
              --output "results/${name}_spectral.json" || true
          done

      - name: Score results
        run: |
          pip install --quiet pyyaml azure-storage-blob azure-identity
          python3 scripts/score_local.py \
            --results-dir results \
            --specs-dir specs \
            --output-dir results

      - name: Generate HTML and Excel dashboards
        run: |
          pip install --quiet pandas openpyxl
          python3 scripts/generate_excel.py \
            --scores-file results/scores.csv \
            --violations-file results/violations_flat.csv \
            --output results/powerbi_data.xlsx
          python3 scripts/generate_dashboard.py \
            --scores-file results/scores.csv \
            --violations-file results/violations_flat.csv \
            --output results/dashboard.html

      - name: Upload scores to Azure Blob
        # Désactiver ce step en POC local : mettre if: false
        # Activer en prod : fournir les secrets AZURE_STORAGE_ACCOUNT + AZURE_STORAGE_KEY
        if: ${{ secrets.AZURE_STORAGE_ACCOUNT != '' }}
        run: |
          az storage blob upload-batch \
            --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            --account-key "${{ secrets.AZURE_STORAGE_KEY }}" \
            --destination linter-results \
            --source results \
            --pattern "*.json" \
            --overwrite

      - name: Upload results as artifact (POC — sans Azure)
        uses: actions/upload-artifact@v4
        with:
          name: spectral-scores
          path: results/
          retention-days: 30
