name: "Governance Hub: Aggregate Dashboard"

on:
  push:
    paths:
      - "incoming-reports/*.json"
    branches: [main]
  workflow_dispatch:

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: pip install --quiet pandas

      - name: Aggregate Scores
        working-directory: dashboard
        run: python score_local.py --results-dir ../incoming-reports --output-dir ../results

      - name: Generate Dashboard HTML
        working-directory: dashboard
        run: |
          python generate_dashboard.py \
            --scores-file ../results/scores.csv \
            --violations-file ../results/violations_flat.csv \
            --output ../results/dashboard.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./results
          keep_files: true
