name: "Governance Hub: Aggregate Dashboard"

on:
  push:
    paths:
      - "incoming-reports/*.json"
    branches: [main, "feature/kong-runtime-v2"]
  workflow_dispatch:

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: pip install --quiet pandas

      - name: Aggregate Scores
        working-directory: scripts
        run: python compute_scores.py --results-dir ../incoming-reports --output-dir ../results

      - name: Fetch Kong Konnect Runtime Data
        working-directory: scripts
        env:
          KONG_PAT: ${{ secrets.HUB_PAT }}
        run: python fetch_konnect_runtime.py

      - name: Generate Dashboard HTML
        working-directory: scripts
        run: |
          python generate_dashboard.py \
            --scores-file ../results/scores.csv \
            --violations-file ../results/violations_flat.csv \
            --kong-file ../results/kong_runtime.json \
            --output ../results/dashboard.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./results
          destination_dir: v2
          keep_files: true
